name: Identity firewall

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Fails the build if tracked files contain absolute home paths, key material, or any pattern in
# the IDENTITY_DENYLIST secret. The denylist is supplied at runtime and never lives in the tree,
# so the public repository can screen for private strings without containing them.
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Leak scan
        run: bash scripts/check-no-leaks.sh
        env:
          IDENTITY_DENYLIST: ${{ secrets.IDENTITY_DENYLIST }}
      - name: Commit identity
        run: bash scripts/check-git-identity.sh --range HEAD
