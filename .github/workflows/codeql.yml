name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: |
            signer/lighter/go.sum
            signer/robinhood/go.sum
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: go
          build-mode: manual
      - name: Build signer modules
        run: |
          for module in signer/lighter signer/robinhood; do
            (cd "$module" && go build ./...)
          done
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
