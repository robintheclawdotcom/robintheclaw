name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Format check
        run: forge fmt --check
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv

  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  runtime:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  verifier:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verifier
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  zk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Noir
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: Select Noir version
        run: noirup --version 1.0.0-beta.22
      - name: Install Barretenberg
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> "$GITHUB_PATH"
      - name: Select bb version
        run: bbup --version 2.0.0 || bbup
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Circuit tests
        working-directory: zk/circuits/proof-of-pnl
        run: nargo test
      - name: Prover encoding tests
        working-directory: zk/prover
        run: node --test
      - name: Install forge-std
        working-directory: zk/contracts
        run: forge install foundry-rs/forge-std --no-git
      - name: On-chain verifier tests
        working-directory: zk/contracts
        run: forge test

  standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Repo standards
        run: bash scripts/check-repo-standards.sh
      - name: Leak scan
        run: bash scripts/check-no-leaks.sh
        env:
          IDENTITY_DENYLIST: ${{ secrets.IDENTITY_DENYLIST }}
