name: CI

on:
  push:
    branches: [main, "codex/**", "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
      - name: Format
        run: forge fmt --check
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy
      - run: bash scripts/check-rust-crates.sh

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: robin_runtime_test
          POSTGRES_USER: robin
          POSTGRES_PASSWORD: robin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U robin -d robin_runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgres://robin:robin_test@127.0.0.1:5432/robin_runtime_test?sslmode=disable
      APP_TEST_DATABASE_URL: postgres://robin:robin_test@127.0.0.1:5432/robin_app_test?sslmode=disable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Validate application migrations
        run: |
          PGPASSWORD=robin_test createdb --host=127.0.0.1 --username=robin robin_app_test
          for migration in app/migrations/*.sql; do
            psql "$APP_TEST_DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"
          done
          cargo test --locked --manifest-path app/Cargo.toml --test postgres -- --ignored --test-threads=1
      - name: Validate runtime migrations
        run: |
          for migration in runtime/migrations/*.sql; do
            psql "$TEST_DATABASE_URL" --set ON_ERROR_STOP=1 --file "$migration"
          done
      - name: Validate coordinator promotion gates
        run: cargo test --locked --manifest-path coordinator/Cargo.toml --test postgres -- --ignored

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            signal/package-lock.json
            verifier/package-lock.json
            web/package-lock.json
      - run: bash scripts/check-node-packages.sh

  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: robin_signer_test
          POSTGRES_USER: robin
          POSTGRES_PASSWORD: robin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U robin -d robin_signer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgres://robin:robin_test@127.0.0.1:5432/robin_signer_test?sslmode=disable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: |
            liveexec/go.mod
            provisioner/robinhood/go.sum
            provisioner/lighter/go.sum
            publisher/go.mod
            runtime/exit-quote-publisher/go.sum
            runtime/live-evaluation/go.sum
            runtime/live-scheduler/go.sum
            runtime/sequencer-publisher/go.sum
            signer/lighter/go.sum
            signer/robinhood/go.sum
      - name: Verify private service modules
        run: |
          for module in liveexec publisher provisioner/lighter provisioner/robinhood runtime/exit-quote-publisher runtime/live-evaluation runtime/live-scheduler runtime/sequencer-publisher signer/lighter signer/robinhood; do
            test -z "$(gofmt -l "$module")"
            (cd "$module" && go mod verify)
            (cd "$module" && go vet ./...)
            (cd "$module" && go test -race -count=1 ./...)
          done
      - name: Scan private service dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          for module in liveexec publisher provisioner/lighter provisioner/robinhood runtime/exit-quote-publisher runtime/live-evaluation runtime/live-scheduler runtime/sequencer-publisher signer/lighter signer/robinhood; do
            (cd "$module" && govulncheck ./...)
          done

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Repository policy
        run: bash scripts/check-repo-standards.sh
      - name: Blueprint policy
        run: ruby scripts/validate-blueprint.rb
      - name: Mainnet activation policy
        run: |
          node --test config/validate-live-policy.test.mjs
          bash scripts/validate-mainnet-release.sh
      - name: Leak scan
        run: bash scripts/check-no-leaks.sh
        env:
          IDENTITY_DENYLIST: ${{ secrets.IDENTITY_DENYLIST }}

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit Rust locks
        run: |
          find . -mindepth 2 -maxdepth 2 -name Cargo.lock -not -path './contracts/*' -print0 | sort -z | while IFS= read -r -d '' lock; do
            cargo audit --file "$lock"
          done
      - name: Audit Node locks
        run: |
          find . -mindepth 2 -maxdepth 2 -name package-lock.json -print0 | sort -z | while IFS= read -r -d '' lock; do
            npm audit --prefix "$(dirname "$lock")" --audit-level=high
          done

  contract-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        with:
          target: contracts
          fail-on: high
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Install Aderyn
        run: cargo install aderyn --version 0.3.4 --locked
      - name: Run Aderyn
        run: aderyn contracts --output /tmp/aderyn.md

  supply-chain:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build release subject
        run: git archive --format=tar.gz --output=robin-source.tar.gz HEAD
      - uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: robin-source.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence
          path: |
            robin-source.tar.gz
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 90

  zk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Noir
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
      - name: Select Noir version
        run: noirup --version 1.0.0-beta.22
      - name: Install Barretenberg
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> "$GITHUB_PATH"
      - name: Select bb version
        run: bbup --version 2.0.0 || bbup
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Circuit tests
        working-directory: zk/circuits/proof-of-pnl
        run: nargo test
      - name: Prover encoding tests
        working-directory: zk/prover
        run: node --test
      - name: Install forge-std
        working-directory: zk/contracts
        run: forge install foundry-rs/forge-std --no-git
      - name: On-chain verifier tests
        working-directory: zk/contracts
        run: forge test
