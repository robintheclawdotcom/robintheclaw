[profile.default]
src = "."
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./fixtures" }]

[fmt]
line_length = 100
bracket_spacing = true
# HonkVerifier.sol is generated by bb; keep it byte-identical to the backend output.
ignore = ["HonkVerifier.sol"]
