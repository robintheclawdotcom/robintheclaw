        sync: false
  - name: robin-lighter-signer-auth
    envVars:
      - key: LIGHTER_SIGNER_HMAC_KEY
        sync: false
  - name: robin-lighter-signer-bridge-auth
    envVars:
      - key: LIGHTER_SIGNER_BRIDGE_HMAC_KEY
        sync: false
  - name: robin-lighter-publisher-bridge-auth
    envVars:
