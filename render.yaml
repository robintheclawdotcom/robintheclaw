previews:
  generation: "off"

projects:
  - name: Robin the Claw
    environments:
      - name: Production
        envVarGroups:
          - name: robin-quote-authority-exit-auth
            envVars:
              - key: ROBIN_QUOTE_AUTHORITY_EXIT_HMAC_KEY
                generateValue: true
          - name: robin-quote-authority-request-auth
            envVars:
              - key: ROBIN_QUOTE_AUTHORITY_HMAC_KEY
                generateValue: true
          - name: robin-strategy-runner-request-auth
            envVars:
              - key: ROBIN_STRATEGY_RUNNER_HMAC_KEY
                generateValue: true
          - name: robin-db-app-api
            envVars:
              - key: ROBIN_APP_API_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-app-paper
            envVars:
              - key: ROBIN_APP_PAPER_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-app-readonly
            envVars:
              - key: ROBIN_APP_READONLY_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-research-collector
            envVars:
              - key: ROBIN_RESEARCH_COLLECTOR_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-research-paper
            envVars:
              - key: ROBIN_RESEARCH_PAPER_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-research-readonly
            envVars:
              - key: ROBIN_RESEARCH_READONLY_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-coordinator
            envVars:
              - key: ROBIN_EXECUTION_COORDINATOR_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-live-control
            envVars:
              - key: ROBIN_EXECUTION_LIVE_CONTROL_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-sequencer-1
            envVars:
              - key: ROBIN_EXECUTION_SEQUENCER_1_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-sequencer-2
            envVars:
              - key: ROBIN_EXECUTION_SEQUENCER_2_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-sequencer-3
            envVars:
              - key: ROBIN_EXECUTION_SEQUENCER_3_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-aapl-relay-1
            envVars:
              - key: ROBIN_EXECUTION_AAPL_RELAY_1_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-aapl-relay-2
            envVars:
              - key: ROBIN_EXECUTION_AAPL_RELAY_2_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-aapl-relay-3
            envVars:
              - key: ROBIN_EXECUTION_AAPL_RELAY_3_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-execution-readonly
            envVars:
              - key: ROBIN_EXECUTION_READONLY_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-lighter-provisioner
            envVars:
              - key: ROBIN_LIGHTER_PROVISIONER_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-lighter-readonly
            envVars:
              - key: ROBIN_LIGHTER_READONLY_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-custody-provisioner
            envVars:
              - key: ROBIN_CUSTODY_PROVISIONER_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-custody-signer
            envVars:
              - key: ROBIN_CUSTODY_SIGNER_DATABASE_PASSWORD
                generateValue: true
          - name: robin-db-custody-readonly
            envVars:
              - key: ROBIN_CUSTODY_READONLY_DATABASE_PASSWORD
                generateValue: true

        services:
          - type: web
            name: robintheclaw
            runtime: node
            plan: starter
            region: virginia
            buildCommand: cd web && npm ci && npm run build
            startCommand: cd web && npm run start
            healthCheckPath: /
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            renderSubdomainPolicy: disabled
            domains:
              - robintheclaw.com
            buildFilter:
              paths:
                - web/**
                - docs/**
                - render.yaml
            envVars:
              - key: APP_API_BASE_URL
                fromService:
                  type: pserv
                  name: robin-api
                  property: hostport
              - key: APP_ORIGIN
                value: https://robintheclaw.com
              - key: NEXT_PUBLIC_PRIVY_APP_ID
                sync: false
              - key: PRIVY_VERIFICATION_KEY
                sync: false

          - type: pserv
            name: robin-api
            runtime: rust
            plan: starter
            region: virginia
            buildCommand: cargo build --locked --release --manifest-path app/Cargo.toml --bin app
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_APP_API_DATABASE_PASSWORD bash scripts/prepare-database.sh app "$DATABASE_OWNER_URL" robin_app_api
            startCommand: ruby scripts/database-runtime-exec.rb --binding DATABASE_OWNER_URL,robin_app_api,ROBIN_APP_API_DATABASE_PASSWORD,DATABASE_URL -- ./app/target/release/app
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            buildFilter:
              paths:
                - app/**
                - contracts/**
                - config/**
                - scripts/database-runtime-exec.rb
                - scripts/migrate-app.sh
                - scripts/prepare-database.sh
                - scripts/provision-database-roles.sh
                - scripts/psql-with-url.rb
                - scripts/run-ordered-migrations.sh
                - render.yaml
            envVars:
              - key: HOST
                value: 0.0.0.0
              - key: RUST_LOG
                value: info
              - key: DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-app
                  property: connectionString
              - fromGroup: robin-db-app-api
              - key: APP_RUN_MIGRATIONS
                value: "false"
              - key: APP_CHAIN_ID
                value: "4663"
              - key: AGENT_STRATEGY_VERSION
                value: basis-aapl-v1
              - key: LIGHTER_PROVISIONER_URL
                fromService:
                  name: robin-lighter-provisioner
                  type: pserv
                  property: hostport
              - key: LIGHTER_PROVISIONER_CALLER_ID
                value: robin-api
              - key: LIGHTER_API_KEY_INDEX
                value: "254"
              - fromGroup: robin-lighter-provisioner-auth
              - fromGroup: robin-readiness-publisher-auth
              - fromGroup: robin-coordinator-control-auth
              - fromGroup: robin-coordinator-registration-auth
              - fromGroup: robin-robinhood-provisioner-auth
              - key: READINESS_CALLER_ID
                value: readiness-publisher
              - key: COORDINATOR_COMMAND_URL
                fromService:
                  name: robin-execution-coordinator
                  type: pserv
                  property: hostport
              - key: COORDINATOR_COMMAND_CALLER_ID
                value: product-command-worker
              - key: COMMAND_WORKER_ID
                value: product-command-worker-1
              - key: COORDINATOR_REGISTRATION_URL
                fromService:
                  name: robin-execution-coordinator
                  type: pserv
                  property: hostport
              - key: COORDINATOR_REGISTRATION_CALLER_ID
                value: product-account-provisioner
              - key: REGISTRATION_WORKER_ID
                value: product-account-registration-1
              - key: ROBINHOOD_PROVISIONER_URL
                fromService:
                  name: robin-robinhood-provisioner
                  type: pserv
                  property: hostport
              - key: ROBINHOOD_PROVISIONER_CALLER_ID
                value: robin-api
              - key: APP_RPC_URL
                sync: false
              - key: PRODUCT_INDEXER_LOOKBACK_BLOCKS
                value: "50000"
              - key: PRODUCT_INDEXER_BLOCK_RANGE
                value: "10000"
              - key: PRIVY_APP_ID
                sync: false
              - key: PRIVY_APP_SECRET
                sync: false
              - key: PRIVY_VERIFICATION_KEY
                sync: false
              - key: RH_MAINNET_RPC
                sync: false
              - key: RH_RPC_FALLBACK
                sync: false
              - key: RH_CHAIN_ID
                value: "4663"
              - key: VAULT_ADDRESS
                sync: false
              - key: ANCHOR_ADDRESS
                sync: false
              - key: GUARD_ADDRESS
                sync: false
              - key: EVM_ENABLED
                value: "true"
              - key: GEO_BLOCKING_ENABLED
                value: "false"
              - key: CORS_ORIGINS
                value: https://robintheclaw.com

          - type: worker
            name: robin-research-collector
            runtime: rust
            plan: standard
            region: virginia
            buildCommand: cargo build --locked --release --manifest-path runtime/Cargo.toml --bin collector
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_RESEARCH_COLLECTOR_DATABASE_PASSWORD bash scripts/prepare-database.sh research "$DATABASE_OWNER_URL" robin_research_collector
            startCommand: ruby scripts/database-runtime-exec.rb --binding DATABASE_OWNER_URL,robin_research_collector,ROBIN_RESEARCH_COLLECTOR_DATABASE_PASSWORD,DATABASE_URL -- ./runtime/target/release/collector
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 120
            buildFilter:
              paths:
                - runtime/**
                - config/**
                - scripts/database-runtime-exec.rb
                - scripts/migrate-research.sh
                - scripts/prepare-database.sh
                - scripts/provision-database-roles.sh
                - scripts/psql-with-url.rb
                - scripts/run-ordered-migrations.sh
                - render.yaml
            envVars:
              - key: DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-research
                  property: connectionString
              - fromGroup: robin-db-research-collector
              - key: RUNTIME_RUN_MIGRATIONS
                value: "false"
              - key: RUNTIME_CONFIG
                value: config/addresses.json
              - key: RUNTIME_UNIVERSE
                value: AAPL
              - key: ROBINHOOD_RPC_URL
                sync: false
              - key: RUST_LOG
                value: info
              - key: R2_BUCKET
                sync: false
              - key: AWS_ENDPOINT_URL
                sync: false
              - key: AWS_ACCESS_KEY_ID
                sync: false
              - key: AWS_SECRET_ACCESS_KEY
                sync: false
              - key: AWS_SESSION_TOKEN
                sync: false
              - key: AWS_REGION
                value: auto

          - type: worker
            name: robin-paper-agent
            runtime: rust
            plan: standard
            region: virginia
            buildCommand: cargo build --locked --release --manifest-path runtime/Cargo.toml --bin paper_agent
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_RESEARCH_PAPER_DATABASE_PASSWORD bash scripts/prepare-database.sh research "$DATABASE_OWNER_URL" robin_research_paper && ROBIN_DATABASE_PASSWORD=$ROBIN_APP_PAPER_DATABASE_PASSWORD bash scripts/prepare-database.sh app "$AGENT_DATABASE_OWNER_URL" robin_app_paper
            startCommand: ruby scripts/database-runtime-exec.rb --binding DATABASE_OWNER_URL,robin_research_paper,ROBIN_RESEARCH_PAPER_DATABASE_PASSWORD,DATABASE_URL --binding AGENT_DATABASE_OWNER_URL,robin_app_paper,ROBIN_APP_PAPER_DATABASE_PASSWORD,AGENT_DATABASE_URL -- /usr/bin/env PAPER_MINIMUM_NET_EDGE_PPM=$AAPL_MINIMUM_NET_EDGE_PPM ./runtime/target/release/paper_agent
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 120
            buildFilter:
              paths:
                - runtime/**
                - config/**
                - app/migrations/**
                - scripts/database-runtime-exec.rb
                - scripts/migrate-app.sh
                - scripts/migrate-research.sh
                - scripts/prepare-database.sh
                - scripts/provision-database-roles.sh
                - scripts/psql-with-url.rb
                - scripts/run-ordered-migrations.sh
                - render.yaml
            envVars:
              - key: DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-research
                  property: connectionString
              - fromGroup: robin-db-research-paper
              - key: RUNTIME_RUN_MIGRATIONS
                value: "false"
              - key: PAPER_AGENT_CONFIG
                value: runtime/config/mainnet-paper.json
              - key: AGENT_DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-app
                  property: connectionString
              - fromGroup: robin-db-app-paper
              - fromGroup: robin-aapl-strategy-policy
              - key: ROBINHOOD_RPC_URL
                sync: false
              - key: RUST_LOG
                value: info

          - type: pserv
            name: robin-execution-coordinator
            runtime: rust
            plan: starter
            region: virginia
            buildCommand: cargo build --locked --release --manifest-path coordinator/Cargo.toml
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_EXECUTION_COORDINATOR_DATABASE_PASSWORD bash scripts/prepare-database.sh execution "$DATABASE_OWNER_URL" robin_execution_coordinator
            startCommand: ruby scripts/database-runtime-exec.rb --binding DATABASE_OWNER_URL,robin_execution_coordinator,ROBIN_EXECUTION_COORDINATOR_DATABASE_PASSWORD,DATABASE_URL -- /usr/bin/env LISTEN_ADDRESS=0.0.0.0:$PORT ./coordinator/target/release/coordinator
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            buildFilter:
              paths:
                - coordinator/**
                - execution/**
                - research/**
                - runtime/live-evaluation/migrations/**
                - runtime/live-scheduler/migrations/**
                - scripts/migrate-execution.sh
                - runtime/sequencer-publisher/migrations/**
                - scripts/database-runtime-exec.rb
                - scripts/lock-execution-after-migration.sql
                - scripts/prepare-database.sh
                - scripts/provision-database-roles.sh
                - scripts/psql-with-url.rb
                - scripts/run-ordered-migrations.sh
                - render.yaml
            envVars:
              - key: COORDINATOR_ENABLED
                value: "true"
              - key: DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-execution
                  property: connectionString
              - fromGroup: robin-db-execution-coordinator
              - fromGroup: robin-coordinator-intent-auth
              - fromGroup: robin-coordinator-exit-auth
              - fromGroup: robin-coordinator-venue-auth
              - fromGroup: robin-coordinator-market-auth
              - fromGroup: robin-coordinator-account-auth
              - fromGroup: robin-coordinator-control-auth
              - fromGroup: robin-coordinator-registration-auth
              - fromGroup: robin-coordinator-episode-auth
              - key: INTENT_CALLER_ID
                value: strategy-runner
              - key: EXIT_CALLER_ID
                value: strategy-runner-exit
              - key: VENUE_EVENT_CALLER_ID
                value: runtime-collector
              - key: MARKET_QUOTE_CALLER_ID
                value: quote-authority-market
              - key: OPEN_EPISODE_CALLER_ID
                value: quote-authority-resolver
              - key: ACCOUNT_SNAPSHOT_CALLER_ID
                value: account-publisher
              - key: CONTROL_CALLER_ID
                value: product-command-worker
              - key: REGISTRATION_CALLER_ID
                value: product-account-provisioner
              - key: COORDINATOR_WORKER_ID
                value: coordinator-1
              - key: SIGNER_CALLER_ID
                value: execution-coordinator
              - fromGroup: robin-lighter-signer-auth
              - fromGroup: robin-robinhood-signer-auth
              - key: LIGHTER_API_URL
                value: https://mainnet.zklighter.elliot.ai
              - key: LIGHTER_SIGNER_HOSTPORT
                fromService:
                  name: robin-lighter-signer
                  type: pserv
                  property: hostport
              - key: ROBINHOOD_SIGNER_HOSTPORT
                fromService:
                  name: robin-robinhood-signer
                  type: pserv
                  property: hostport
              - key: RUST_LOG
                value: info

          - type: pserv
            name: robin-account-publisher
            runtime: go
            plan: starter
            region: virginia
            buildCommand: cd publisher && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/account-publisher ./cmd/account-publisher
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_EXECUTION_READONLY_DATABASE_PASSWORD bash scripts/prepare-database.sh execution "$ACCOUNT_PUBLISHER_COORDINATOR_DATABASE_OWNER_URL" robin_execution_readonly && ROBIN_DATABASE_PASSWORD=$ROBIN_CUSTODY_READONLY_DATABASE_PASSWORD bash scripts/prepare-database.sh custody "$ACCOUNT_PUBLISHER_CUSTODY_DATABASE_OWNER_URL" robin_custody_readonly
            startCommand: ruby scripts/database-runtime-exec.rb --binding ACCOUNT_PUBLISHER_COORDINATOR_DATABASE_OWNER_URL,robin_execution_readonly,ROBIN_EXECUTION_READONLY_DATABASE_PASSWORD,ACCOUNT_PUBLISHER_COORDINATOR_DATABASE_URL --binding ACCOUNT_PUBLISHER_CUSTODY_DATABASE_OWNER_URL,robin_custody_readonly,ROBIN_CUSTODY_READONLY_DATABASE_PASSWORD,ACCOUNT_PUBLISHER_ROBINHOOD_DATABASE_URL --binding ACCOUNT_PUBLISHER_CUSTODY_DATABASE_OWNER_URL,robin_custody_readonly,ROBIN_CUSTODY_READONLY_DATABASE_PASSWORD,ACCOUNT_PUBLISHER_ROBINHOOD_JOURNAL_DATABASE_URL -- /usr/bin/env LISTEN_ADDRESS=0.0.0.0:$PORT ACCOUNT_PUBLISHER_COORDINATOR_HMAC_KEY=$COORDINATOR_ACCOUNT_HMAC_KEY ACCOUNT_PUBLISHER_APPLICATION_HMAC_KEY=$READINESS_HMAC_KEY ACCOUNT_PUBLISHER_LIGHTER_MARKET_ID=$LIGHTER_AAPL_MARKET_INDEX ./publisher/bin/account-publisher
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            buildFilter:
              paths:
                - publisher/**
                - coordinator/migrations/**
                - provisioner/robinhood/migrations/**
                - signer/robinhood/migrations/**
                - runtime/live-evaluation/migrations/**
                - runtime/live-scheduler/migrations/**
                - runtime/sequencer-publisher/migrations/**
                - scripts/database-runtime-exec.rb
                - scripts/lock-execution-after-migration.sql
                - scripts/migrate-execution.sh
                - scripts/migrate-robinhood-provisioner.sh
                - scripts/migrate-robinhood-signer.sh
                - scripts/prepare-database.sh
                - scripts/provision-database-roles.sh
                - scripts/psql-with-url.rb
                - scripts/run-ordered-migrations.sh
                - render.yaml
            envVars:
              - key: ACCOUNT_PUBLISHER_ENABLED
                value: "true"
              - key: ACCOUNT_PUBLISHER_ENVIRONMENT
                value: mainnet
              - key: GO_VERSION
                value: "1.26.5"
              - key: ACCOUNT_PUBLISHER_COORDINATOR_DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-execution
                  property: connectionString
              - fromGroup: robin-db-execution-readonly
              - key: ACCOUNT_PUBLISHER_CUSTODY_DATABASE_OWNER_URL
                fromDatabase:
                  name: robin-robinhood-custody
                  property: connectionString
              - fromGroup: robin-db-custody-readonly
              - key: ACCOUNT_PUBLISHER_PRIMARY_RPC_URL
                sync: false
              - key: ACCOUNT_PUBLISHER_SECONDARY_RPC_URL
                sync: false
              - key: ACCOUNT_PUBLISHER_MINIMUM_COLLATERAL_RAW
                sync: false
              - key: ACCOUNT_PUBLISHER_MINIMUM_SETTLEMENT_RAW
                sync: false
              - key: ACCOUNT_PUBLISHER_MINIMUM_OWNER_GAS_RAW
                sync: false
              - key: ACCOUNT_PUBLISHER_MINIMUM_SIGNER_GAS_RAW
                sync: false
              - key: ACCOUNT_PUBLISHER_POLL_MILLISECONDS
                value: "4500"
              - key: ACCOUNT_PUBLISHER_LIGHTER_BRIDGE_URL
                fromService:
                  name: robin-lighter-provisioner
                  type: pserv
                  property: hostport
              - key: LIGHTER_PUBLISHER_BRIDGE_CALLER_ID
                value: account-publisher
              - fromGroup: robin-lighter-publisher-bridge-auth
              - fromGroup: robin-lighter-market-config
              - key: ACCOUNT_PUBLISHER_COORDINATOR_URL
                fromService:
                  name: robin-execution-coordinator
                  type: pserv
                  property: hostport
              - key: ACCOUNT_PUBLISHER_COORDINATOR_CALLER_ID
                value: account-publisher
              - fromGroup: robin-coordinator-account-auth
              - key: ACCOUNT_PUBLISHER_APPLICATION_URL
                fromService:
                  name: robin-api
                  type: pserv
                  property: hostport
              - key: ACCOUNT_PUBLISHER_APPLICATION_CALLER_ID
                value: readiness-publisher
              - fromGroup: robin-readiness-publisher-auth

          - type: pserv
            name: robin-quote-authority
            runtime: go
            plan: starter
            region: virginia
            buildCommand: cd liveexec && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/quote-authority ./cmd/quote-authority
            startCommand: ROBIN_QUOTE_AUTHORITY_LISTEN=0.0.0.0:$PORT ROBIN_COORDINATOR_URL=http://$ROBIN_COORDINATOR_HOSTPORT ROBIN_COORDINATOR_MARKET_HMAC_KEY=$COORDINATOR_MARKET_HMAC_KEY ROBIN_COORDINATOR_EPISODE_HMAC_KEY=$COORDINATOR_EPISODE_HMAC_KEY ROBIN_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./liveexec/bin/quote-authority
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            buildFilter:
              paths:
                - liveexec/**
                - config/**
                - render.yaml
            envVars:
              - key: ROBIN_QUOTE_AUTHORITY_ENABLED
                value: "true"
              - key: GO_VERSION
                value: "1.26.5"
              - key: ROBIN_QUOTE_AUTHORITY_CALLER
                value: live-scheduler-quote
              - fromGroup: robin-quote-authority-request-auth
              - fromGroup: robin-quote-authority-exit-auth
              - key: ROBIN_QUOTE_AUTHORITY_EXIT_CALLER
                value: exit-quote-publisher
              - key: ROBIN_QUOTE_AUTHORITY_ED25519_PRIVATE_KEY
                sync: false
              - fromGroup: robin-lighter-market-config
              - fromGroup: robin-coordinator-market-auth
              - fromGroup: robin-coordinator-episode-auth
              - fromGroup: robin-quote-authority-robinhood-rpc
              - fromGroup: robin-lighter-market-spec
              - fromGroup: robin-aapl-reference-feed-config
              - key: LIGHTER_API_URL
                value: https://mainnet.zklighter.elliot.ai
              - key: ROBIN_COORDINATOR_EPISODE_CALLER
                value: quote-authority-resolver
              - key: ROBIN_COORDINATOR_HOSTPORT
                fromService:
                  name: robin-execution-coordinator
                  type: pserv
                  property: hostport
              - key: ROBIN_COORDINATOR_MARKET_CALLER
                value: quote-authority-market

          - type: pserv
            name: robin-strategy-runner
            runtime: go
            plan: starter
            region: virginia
            buildCommand: cd liveexec && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/strategy-runner ./cmd/strategy-runner
            startCommand: ROBIN_STRATEGY_RUNNER_LISTEN=0.0.0.0:$PORT ROBIN_COORDINATOR_URL=http://$ROBIN_COORDINATOR_HOSTPORT ROBIN_COORDINATOR_INTENT_HMAC_KEY=$COORDINATOR_INTENT_HMAC_KEY ROBIN_COORDINATOR_EXIT_HMAC_KEY=$COORDINATOR_EXIT_HMAC_KEY ROBIN_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./liveexec/bin/strategy-runner
            autoDeployTrigger: "off"
            maxShutdownDelaySeconds: 30
            buildFilter:
              paths:
                - liveexec/**
                - config/**
                - render.yaml
            envVars:
              - key: ROBIN_STRATEGY_RUNNER_ENABLED
                value: "true"
              - key: GO_VERSION
                value: "1.26.5"
              - key: ROBIN_STRATEGY_RUNNER_CALLER
                value: live-scheduler-runner
              - fromGroup: robin-strategy-runner-request-auth
              - fromGroup: robin-quote-authority-public-key
              - fromGroup: robin-lighter-market-config
              - fromGroup: robin-coordinator-intent-auth
              - fromGroup: robin-coordinator-exit-auth
              - key: ROBIN_COORDINATOR_HOSTPORT
                fromService:
                  name: robin-execution-coordinator
                  type: pserv
                  property: hostport
              - key: ROBIN_COORDINATOR_INTENT_CALLER
                value: strategy-runner
              - key: ROBIN_COORDINATOR_EXIT_CALLER
                value: strategy-runner-exit

          - type: worker
            name: robin-exit-quote-publisher
            runtime: go
            plan: starter
            region: virginia
            buildCommand: cd runtime/exit-quote-publisher && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/exit-quote-publisher ./cmd/exit-quote-publisher
            preDeployCommand: ROBIN_DATABASE_PASSWORD=$ROBIN_EXECUTION_READONLY_DATABASE_PASSWORD bash scripts/prepare-database.sh execution "$ROBIN_EXIT_QUOTE_PUBLISHER_DATABASE_OWNER_URL" robin_execution_readonly
