      - key: AAPL_REFERENCE_FEED_HEARTBEAT_SECONDS
        sync: false
  - name: robin-robinhood-signer-auth
    envVars:
      - key: ROBINHOOD_SIGNER_HMAC_KEY
        sync: false
  - name: robin-robinhood-provisioner-auth
    envVars:
      - key: ROBINHOOD_PROVISIONER_HMAC_KEY
        sync: false
  - name: robin-robinhood-signer-bridge-auth
    envVars:
      - key: ROBINHOOD_SIGNER_BRIDGE_HMAC_KEY
        sync: false
  - name: robin-coordinator-intent-auth
    envVars:
      - key: COORDINATOR_INTENT_HMAC_KEY
        sync: false
  - name: robin-coordinator-exit-auth
    envVars:
      - key: COORDINATOR_EXIT_HMAC_KEY
        sync: false
  - name: robin-coordinator-venue-auth
    envVars:
      - key: COORDINATOR_VENUE_HMAC_KEY
        sync: false
  - name: robin-coordinator-market-auth
    envVars:
      - key: COORDINATOR_MARKET_HMAC_KEY
        sync: false
  - name: robin-coordinator-account-auth
    envVars:
      - key: COORDINATOR_ACCOUNT_HMAC_KEY
        sync: false
  - name: robin-coordinator-control-auth
    envVars:
      - key: COORDINATOR_CONTROL_HMAC_KEY
        sync: false
  - name: robin-coordinator-registration-auth
    envVars:
      - key: COORDINATOR_REGISTRATION_HMAC_KEY
        sync: false
  - name: robin-quote-authority-request-auth
    envVars:
      - key: ROBIN_QUOTE_AUTHORITY_HMAC_KEY
        sync: false
  - name: robin-strategy-runner-request-auth
    envVars:
      - key: ROBIN_STRATEGY_RUNNER_HMAC_KEY
        sync: false
  - name: robin-quote-authority-public-key
    envVars:
      - key: ROBIN_QUOTE_AUTHORITY_ED25519_PUBLIC_KEY
        sync: false
  - name: robin-sequencer-feed-config
    envVars:
      - key: SEQUENCER_FEED_ADDRESS
        sync: false
      - key: SEQUENCER_FEED_CODE_HASH
        sync: false

services:
  - type: web
    name: robintheclaw
    runtime: node
    plan: starter
    region: virginia
    buildCommand: cd web && npm ci && npm run build
    startCommand: cd web && npm run start
    healthCheckPath: /
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    renderSubdomainPolicy: disabled
    domains:
      - robintheclaw.com
    previews:
      generation: automatic
    buildFilter:
      paths:
        - web/**
        - docs/**
        - render.yaml
    envVars:
      - key: APP_API_BASE_URL
        fromService:
          type: pserv
          name: robin-api
          property: hostport
      - key: NEXT_PUBLIC_PRIVY_APP_ID
        sync: false
      - key: PRIVY_VERIFICATION_KEY
        sync: false

  - type: pserv
    name: robin-api
    runtime: rust
    plan: starter
    region: virginia
    buildCommand: cargo build --locked --release --manifest-path app/Cargo.toml --bin app
    startCommand: ./app/target/release/app
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - app/**
        - contracts/**
        - config/**
        - render.yaml
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: robin-app
          property: connectionString
      - key: APP_CHAIN_ID
        value: "4663"
      - key: AGENT_STRATEGY_VERSION
        value: basis-aapl-v1
      - key: LIGHTER_PROVISIONER_URL
        fromService:
          name: robin-lighter-provisioner
          type: pserv
          property: hostport
      - key: LIGHTER_PROVISIONER_CALLER_ID
        value: robin-api
      - key: LIGHTER_API_KEY_INDEX
        value: "254"
      - fromGroup: robin-lighter-provisioner-auth
      - fromGroup: robin-readiness-publisher-auth
      - fromGroup: robin-coordinator-control-auth
      - fromGroup: robin-coordinator-registration-auth
      - fromGroup: robin-robinhood-provisioner-auth
      - key: READINESS_CALLER_ID
        value: readiness-publisher
      - key: COORDINATOR_COMMAND_URL
        fromService:
          name: robin-execution-coordinator
          type: pserv
          property: hostport
      - key: COORDINATOR_COMMAND_CALLER_ID
        value: product-command-worker
      - key: COMMAND_WORKER_ID
        value: product-command-worker-1
      - key: COORDINATOR_REGISTRATION_URL
        fromService:
          name: robin-execution-coordinator
          type: pserv
          property: hostport
      - key: COORDINATOR_REGISTRATION_CALLER_ID
        value: product-account-provisioner
      - key: REGISTRATION_WORKER_ID
        value: product-account-registration-1
      - key: ROBINHOOD_PROVISIONER_URL
        fromService:
          name: robin-robinhood-provisioner
          type: pserv
          property: hostport
      - key: ROBINHOOD_PROVISIONER_CALLER_ID
        value: robin-api
      - key: APP_RPC_URL
        sync: false
      - key: PRODUCT_INDEXER_LOOKBACK_BLOCKS
        value: "50000"
      - key: PRODUCT_INDEXER_BLOCK_RANGE
        value: "10000"
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: PRIVY_VERIFICATION_KEY
        sync: false
      - key: RH_MAINNET_RPC
        sync: false
      - key: RH_RPC_FALLBACK
        sync: false
      - key: RH_CHAIN_ID
        value: "4663"
      - key: VAULT_ADDRESS
        sync: false
      - key: ANCHOR_ADDRESS
        sync: false
      - key: GUARD_ADDRESS
        sync: false
      - key: EVM_ENABLED
        value: "true"
      - key: GEO_BLOCKING_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: https://robintheclaw.com

  - type: worker
    name: robin-research-collector
    runtime: rust
    plan: standard
    region: virginia
    buildCommand: cargo build --locked --release --manifest-path runtime/Cargo.toml --bin collector
    startCommand: ./runtime/target/release/collector
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 120
    buildFilter:
      paths:
        - runtime/**
        - config/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: robin-research
          property: connectionPoolString
      - key: DATABASE_MIGRATIONS_URL
        fromDatabase:
          name: robin-research
          property: connectionString
      - key: RUNTIME_CONFIG
        value: config/addresses.json
      - key: RUNTIME_UNIVERSE
        value: AAPL
      - key: ROBINHOOD_RPC_URL
        sync: false
      - key: RUST_LOG
        value: info
      - key: R2_BUCKET
        sync: false
      - key: AWS_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false
      - key: AWS_REGION
        value: auto

  - type: worker
    name: robin-paper-agent
    runtime: rust
    plan: standard
    region: virginia
    buildCommand: cargo build --locked --release --manifest-path runtime/Cargo.toml --bin paper_agent
    startCommand: PAPER_MINIMUM_NET_EDGE_PPM=$AAPL_MINIMUM_NET_EDGE_PPM ./runtime/target/release/paper_agent
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 120
    buildFilter:
      paths:
        - runtime/**
        - config/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: robin-research
          property: connectionPoolString
      - key: DATABASE_MIGRATIONS_URL
        fromDatabase:
          name: robin-research
          property: connectionString
      - key: PAPER_AGENT_CONFIG
        value: runtime/config/mainnet-paper.json
      - key: AGENT_DATABASE_URL
        fromDatabase:
          name: robin-app
          property: connectionString
      - fromGroup: robin-aapl-strategy-policy
      - key: ROBINHOOD_RPC_URL
        sync: false
      - key: RUST_LOG
        value: info

  - type: pserv
    name: robin-execution-coordinator
    runtime: rust
    plan: starter
    region: virginia
    buildCommand: cargo build --locked --release --manifest-path coordinator/Cargo.toml
    preDeployCommand: bash scripts/migrate-execution.sh "$DATABASE_MIGRATIONS_URL"
    startCommand: LISTEN_ADDRESS=0.0.0.0:$PORT ./coordinator/target/release/coordinator
    healthCheckPath: /livez
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - coordinator/**
        - execution/**
        - research/**
        - runtime/live-evaluation/migrations/**
        - runtime/live-scheduler/migrations/**
        - scripts/migrate-execution.sh
        - render.yaml
    envVars:
      - key: COORDINATOR_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: robin-execution
          property: connectionPoolString
      - key: DATABASE_MIGRATIONS_URL
        fromDatabase:
          name: robin-execution
          property: connectionString
      - fromGroup: robin-coordinator-intent-auth
      - fromGroup: robin-coordinator-exit-auth
      - fromGroup: robin-coordinator-venue-auth
      - fromGroup: robin-coordinator-market-auth
      - fromGroup: robin-coordinator-account-auth
      - fromGroup: robin-coordinator-control-auth
      - fromGroup: robin-coordinator-registration-auth
      - fromGroup: robin-coordinator-episode-auth
      - key: INTENT_CALLER_ID
        value: strategy-runner
      - key: EXIT_CALLER_ID
        value: strategy-runner-exit
      - key: VENUE_EVENT_CALLER_ID
        value: runtime-collector
      - key: MARKET_QUOTE_CALLER_ID
        value: quote-authority-market
      - key: OPEN_EPISODE_CALLER_ID
        value: quote-authority-resolver
      - key: ACCOUNT_SNAPSHOT_CALLER_ID
        value: account-publisher
      - key: CONTROL_CALLER_ID
        value: product-command-worker
      - key: REGISTRATION_CALLER_ID
        value: product-account-provisioner
      - key: COORDINATOR_WORKER_ID
        value: coordinator-1
      - key: SIGNER_CALLER_ID
        value: execution-coordinator
      - fromGroup: robin-lighter-signer-auth
      - fromGroup: robin-robinhood-signer-auth
      - key: LIGHTER_API_URL
        value: https://mainnet.zklighter.elliot.ai
      - key: LIGHTER_SIGNER_HOSTPORT
        fromService:
          name: robin-lighter-signer
          type: pserv
          property: hostport
      - key: ROBINHOOD_SIGNER_HOSTPORT
        fromService:
          name: robin-robinhood-signer
          type: pserv
          property: hostport
      - key: RUST_LOG
        value: info

  - type: pserv
    name: robin-account-publisher
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd publisher && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/account-publisher ./cmd/account-publisher
    startCommand: LISTEN_ADDRESS=0.0.0.0:$PORT ACCOUNT_PUBLISHER_COORDINATOR_HMAC_KEY=$COORDINATOR_ACCOUNT_HMAC_KEY ACCOUNT_PUBLISHER_APPLICATION_HMAC_KEY=$READINESS_HMAC_KEY ACCOUNT_PUBLISHER_LIGHTER_MARKET_ID=$LIGHTER_AAPL_MARKET_INDEX ./publisher/bin/account-publisher
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - publisher/**
        - render.yaml
    envVars:
      - key: ACCOUNT_PUBLISHER_ENABLED
        value: "true"
      - key: ACCOUNT_PUBLISHER_ENVIRONMENT
        value: mainnet
      - key: GO_VERSION
        value: "1.24.5"
      - key: ACCOUNT_PUBLISHER_COORDINATOR_DATABASE_URL
        sync: false
      - key: ACCOUNT_PUBLISHER_ROBINHOOD_DATABASE_URL
        sync: false
      - key: ACCOUNT_PUBLISHER_ROBINHOOD_JOURNAL_DATABASE_URL
        sync: false
      - key: ACCOUNT_PUBLISHER_PRIMARY_RPC_URL
        sync: false
      - key: ACCOUNT_PUBLISHER_SECONDARY_RPC_URL
        sync: false
      - key: ACCOUNT_PUBLISHER_MINIMUM_COLLATERAL_RAW
        sync: false
      - key: ACCOUNT_PUBLISHER_MINIMUM_SETTLEMENT_RAW
        sync: false
      - key: ACCOUNT_PUBLISHER_MINIMUM_OWNER_GAS_RAW
        sync: false
      - key: ACCOUNT_PUBLISHER_MINIMUM_SIGNER_GAS_RAW
        sync: false
      - key: ACCOUNT_PUBLISHER_POLL_MILLISECONDS
        value: "4500"
      - key: ACCOUNT_PUBLISHER_LIGHTER_BRIDGE_URL
        fromService:
          name: robin-lighter-provisioner
          type: pserv
          property: hostport
      - key: LIGHTER_PUBLISHER_BRIDGE_CALLER_ID
        value: account-publisher
      - fromGroup: robin-lighter-publisher-bridge-auth
      - fromGroup: robin-lighter-market-config
      - key: ACCOUNT_PUBLISHER_COORDINATOR_URL
        fromService:
          name: robin-execution-coordinator
          type: pserv
          property: hostport
      - key: ACCOUNT_PUBLISHER_COORDINATOR_CALLER_ID
        value: account-publisher
      - fromGroup: robin-coordinator-account-auth
      - key: ACCOUNT_PUBLISHER_APPLICATION_URL
        fromService:
          name: robin-api
          type: pserv
          property: hostport
      - key: ACCOUNT_PUBLISHER_APPLICATION_CALLER_ID
        value: readiness-publisher
      - fromGroup: robin-readiness-publisher-auth

  - type: pserv
    name: robin-quote-authority
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd liveexec && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/quote-authority ./cmd/quote-authority
    startCommand: ROBIN_QUOTE_AUTHORITY_LISTEN=0.0.0.0:$PORT ROBIN_COORDINATOR_URL=http://$ROBIN_COORDINATOR_HOSTPORT ROBIN_COORDINATOR_MARKET_HMAC_KEY=$COORDINATOR_MARKET_HMAC_KEY ROBIN_COORDINATOR_EPISODE_HMAC_KEY=$COORDINATOR_EPISODE_HMAC_KEY ROBIN_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./liveexec/bin/quote-authority
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - liveexec/**
        - config/**
        - render.yaml
    envVars:
      - key: ROBIN_QUOTE_AUTHORITY_ENABLED
        value: "true"
      - key: GO_VERSION
        value: "1.24.5"
      - key: ROBIN_QUOTE_AUTHORITY_CALLER
        value: live-scheduler-quote
      - fromGroup: robin-quote-authority-request-auth
      - fromGroup: robin-quote-authority-exit-auth
      - key: ROBIN_QUOTE_AUTHORITY_EXIT_CALLER
        value: exit-quote-publisher
      - key: ROBIN_QUOTE_AUTHORITY_ED25519_PRIVATE_KEY
        sync: false
      - fromGroup: robin-lighter-market-config
      - fromGroup: robin-coordinator-market-auth
      - fromGroup: robin-coordinator-episode-auth
      - fromGroup: robin-quote-authority-robinhood-rpc
      - fromGroup: robin-lighter-market-spec
      - fromGroup: robin-aapl-reference-feed-config
      - key: LIGHTER_API_URL
        value: https://mainnet.zklighter.elliot.ai
      - key: ROBIN_COORDINATOR_EPISODE_CALLER
        value: quote-authority-resolver
      - key: ROBIN_COORDINATOR_HOSTPORT
        fromService:
          name: robin-execution-coordinator
          type: pserv
          property: hostport
      - key: ROBIN_COORDINATOR_MARKET_CALLER
        value: quote-authority-market

  - type: pserv
    name: robin-strategy-runner
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd liveexec && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/strategy-runner ./cmd/strategy-runner
    startCommand: ROBIN_STRATEGY_RUNNER_LISTEN=0.0.0.0:$PORT ROBIN_COORDINATOR_URL=http://$ROBIN_COORDINATOR_HOSTPORT ROBIN_COORDINATOR_INTENT_HMAC_KEY=$COORDINATOR_INTENT_HMAC_KEY ROBIN_COORDINATOR_EXIT_HMAC_KEY=$COORDINATOR_EXIT_HMAC_KEY ROBIN_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./liveexec/bin/strategy-runner
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - liveexec/**
        - config/**
        - render.yaml
    envVars:
      - key: ROBIN_STRATEGY_RUNNER_ENABLED
        value: "true"
      - key: GO_VERSION
        value: "1.24.5"
      - key: ROBIN_STRATEGY_RUNNER_CALLER
        value: live-scheduler-runner
      - fromGroup: robin-strategy-runner-request-auth
      - fromGroup: robin-quote-authority-public-key
      - fromGroup: robin-lighter-market-config
      - fromGroup: robin-coordinator-intent-auth
      - fromGroup: robin-coordinator-exit-auth
      - key: ROBIN_COORDINATOR_HOSTPORT
        fromService:
          name: robin-execution-coordinator
          type: pserv
          property: hostport
      - key: ROBIN_COORDINATOR_INTENT_CALLER
        value: strategy-runner
      - key: ROBIN_COORDINATOR_EXIT_CALLER
        value: strategy-runner-exit

  - type: worker
    name: robin-exit-quote-publisher
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd runtime/exit-quote-publisher && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/exit-quote-publisher ./cmd/exit-quote-publisher
    startCommand: ROBIN_QUOTE_AUTHORITY_URL=http://$ROBIN_QUOTE_AUTHORITY_HOSTPORT ROBIN_EXIT_QUOTE_PUBLISHER_HMAC_KEY=$ROBIN_QUOTE_AUTHORITY_EXIT_HMAC_KEY ROBIN_EXIT_QUOTE_PUBLISHER_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./runtime/exit-quote-publisher/bin/exit-quote-publisher
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - runtime/exit-quote-publisher/**
        - liveexec/**
        - coordinator/migrations/**
        - render.yaml
    envVars:
      - key: ROBIN_EXIT_QUOTE_PUBLISHER_ENABLED
        value: "true"
      - key: GO_VERSION
        value: "1.26.5"
      - key: ROBIN_EXIT_QUOTE_PUBLISHER_DATABASE_URL
        fromDatabase:
          name: robin-execution
          property: connectionString
      - key: ROBIN_EXIT_QUOTE_PUBLISHER_WORKER_ID
        value: exit-quote-publisher-1
      - key: ROBIN_EXIT_QUOTE_PUBLISHER_CALLER
        value: exit-quote-publisher
      - key: ROBIN_QUOTE_AUTHORITY_HOSTPORT
        fromService:
          name: robin-quote-authority
          type: pserv
          property: hostport
      - fromGroup: robin-quote-authority-exit-auth
      - fromGroup: robin-quote-authority-public-key
      - fromGroup: robin-lighter-market-config

  - type: worker
    name: robin-live-scheduler
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd runtime/live-scheduler && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/live-scheduler ./cmd/live-scheduler
    startCommand: ROBIN_QUOTE_AUTHORITY_URL=http://$ROBIN_QUOTE_AUTHORITY_HOSTPORT ROBIN_STRATEGY_RUNNER_URL=http://$ROBIN_STRATEGY_RUNNER_HOSTPORT ROBIN_LIVE_SCHEDULER_QUOTE_HMAC_KEY=$ROBIN_QUOTE_AUTHORITY_HMAC_KEY ROBIN_LIVE_SCHEDULER_RUNNER_HMAC_KEY=$ROBIN_STRATEGY_RUNNER_HMAC_KEY ROBIN_LIVE_SCHEDULER_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ./runtime/live-scheduler/bin/live-scheduler
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - runtime/live-scheduler/**
        - coordinator/migrations/**
        - config/**
        - render.yaml
    envVars:
      - key: ROBIN_LIVE_SCHEDULER_ENABLED
        value: "true"
      - key: GO_VERSION
        value: "1.26.5"
      - key: ROBIN_LIVE_SCHEDULER_DATABASE_URL
        fromDatabase:
          name: robin-execution
          property: connectionString
      - key: ROBIN_LIVE_SCHEDULER_WORKER_ID
        value: live-scheduler-1
      - key: ROBIN_QUOTE_AUTHORITY_HOSTPORT
        fromService:
          name: robin-quote-authority
          type: pserv
          property: hostport
      - key: ROBIN_LIVE_SCHEDULER_QUOTE_CALLER
        value: live-scheduler-quote
      - fromGroup: robin-quote-authority-request-auth
      - fromGroup: robin-quote-authority-public-key
      - fromGroup: robin-lighter-market-config
      - key: ROBIN_STRATEGY_RUNNER_HOSTPORT
        fromService:
          name: robin-strategy-runner
          type: pserv
          property: hostport
      - key: ROBIN_LIVE_SCHEDULER_RUNNER_CALLER
        value: live-scheduler-runner
      - fromGroup: robin-strategy-runner-request-auth

  - type: worker
    name: robin-live-evaluation
    runtime: go
    plan: starter
    region: virginia
    buildCommand: cd runtime/live-evaluation && go mod download && go mod verify && go build -trimpath -ldflags="-s -w" -o bin/live-evaluation ./cmd/live-evaluation
    startCommand: ROBIN_LIVE_EVALUATION_LIGHTER_AAPL_MARKET_INDEX=$LIGHTER_AAPL_MARKET_INDEX ROBIN_LIVE_EVALUATION_LIGHTER_AAPL_BASE_DECIMALS=$LIGHTER_AAPL_BASE_DECIMALS ROBIN_LIVE_EVALUATION_LIGHTER_AAPL_PRICE_DECIMALS=$LIGHTER_AAPL_PRICE_DECIMALS ./runtime/live-evaluation/bin/live-evaluation
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    buildFilter:
      paths:
        - runtime/live-evaluation/**
        - runtime/live-scheduler/**
