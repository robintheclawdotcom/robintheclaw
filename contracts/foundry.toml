[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
rh_mainnet = "https://rpc.mainnet.chain.robinhood.com"
rh_testnet = "https://rpc.testnet.chain.robinhood.com"
